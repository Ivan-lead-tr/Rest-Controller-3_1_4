<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex justify-content-center min-vh-100">
<main class="form-signin mt-5">
    <form th:action="@{/login}" method="post">
        <h1 class="h3 mb-3 fw-normal">Пожалуйста, войдите</h1>
        <div class="mb-0">
            <input type="email" name="username" class="form-control" id="username" placeholder="Адрес электронной почты" required>
        </div>
        <div class="mb-1">
            <input type="password" name="password" class="form-control" id="password" placeholder="Пароль" required>
        </div>
        <button class="w-100 btn btn-lg btn-primary" type="submit">Войти</button>
    </form>
</main>
</body>
</html>
