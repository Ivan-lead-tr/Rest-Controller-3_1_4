<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <title>Users</title>
    <style>
        table, th, td {
            border: 1px solid black;
            padding: 6px;
        }
        .form-inline { display: inline; }
        fieldset { display: inline-block; border: none; padding: 0; margin: 0; }
    </style>
</head>
<body>
<table style="width:70%">
    <thead>
    <tr>
        <th>id</th>
        <th>Имя</th>
        <th>Фамилия</th>
        <th>Почта</th>
        <th>Возраст</th>
        <th>Роли</th>
        <th>Действия</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="user : ${users}">
        <td th:text="${user.id}"></td>
        <td th:text="${user.firstName}"></td>
        <td th:text="${user.lastName}"></td>
        <td th:text="${user.email}"></td>
        <td th:text="${user.age}"></td>
        <td>
            <form th:action="@{/admin/delete}" method="post" class="form-inline">
                <input type="hidden" name="id" th:value="${user.id}"/>
                <button type="submit">Удалить</button>
            </form>
            <form th:action="@{/admin/update}" method="post" class="form-inline">
                <input type="hidden" name="id" th:value="${user.id}"/>
                <input type="password" name="password" placeholder="Новый пароль (не обязательно)"/>
                <input type="text" name="firstName" th:value="${user.firstName}" placeholder="Имя" required/>
                <input type="text" name="lastName" th:value="${user.lastName}" placeholder="Фамилия" required/>
                <input type="email" name="email" th:value="${user.email}" placeholder="Почта" required/>
                <input type="number" name="age" th:value="${user.age}" placeholder="Возраст" required/>
                <fieldset>
                    <label><input type="checkbox" name="roleIds" value="1"/> ADMIN</label>
                    <label><input type="checkbox" name="roleIds" value="2"/> USER</label>
                </fieldset>
                <button type="submit">Редактировать</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
<h3>Добавить пользователя</h3>
<form th:action="@{/admin/add}" method="post">
    <input type="password" name="password" placeholder="Пароль" required/>
    <input type="text" name="firstName" placeholder="Имя" required/>
    <input type="text" name="lastName" placeholder="Фамилия" required/>
    <input type="email" name="email" placeholder="Почта" required/>
    <input type="number" name="age" placeholder="Возраст" required/>
    <fieldset>
        <label><input type="checkbox" name="roleIds" value="1"/> ADMIN</label>
        <label><input type="checkbox" name="roleIds" value="2"/> USER</label>
    </fieldset>
    <button type="submit">Добавить</button>
</form>

<form th:action="@{/logout}" method="post">
    <button type="submit">Выйти</button>
</form>
</body>
</html>
